<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romaneio Varejo — 30/06</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #20243a;
    --border: #2a2f45;
    --accent: #e8a020;
    --accent2: #3b82f6;
    --green: #22c55e;
    --text: #e8eaf0;
    --muted: #7a8099;
    --tag-bg: #1e2236;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
    border-bottom: 2px solid var(--accent);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 42px; height: 42px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .logo h1 { font-size: 1.15rem; font-weight: 700; color: var(--text); }
  .logo p { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

  .header-stats { display: flex; gap: 20px; flex-wrap: wrap; }
  .stat {
    text-align: center;
    background: rgba(232,160,32,0.08);
    border: 1px solid rgba(232,160,32,0.2);
    border-radius: 10px;
    padding: 8px 16px;
  }
  .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--accent); }
  .stat-lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── FILTERS ── */
  .filters {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 160px; }
  .filter-group label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .filter-group select,
  .filter-group input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 7px 10px;
    font-size: 0.85rem;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }
  .filter-group select:focus,
  .filter-group input:focus { border-color: var(--accent); }
  .filter-group select option { background: #1a1d27; }

  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    padding: 7px 16px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all .2s;
    margin-top: 16px;
  }
  .btn-clear:hover { border-color: var(--accent); color: var(--accent); }

  .count-badge {
    margin-top: 16px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .count-badge span { color: var(--accent); font-weight: 700; }

  /* ── TABLE ── */
  .table-wrap {
    padding: 20px 24px;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  thead th {
    background: var(--card2);
    padding: 10px 12px;
    text-align: left;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
  }
  thead th:hover { color: var(--accent); }
  thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
  thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid rgba(42,47,69,0.6);
    transition: background .15s;
  }
  tbody tr:hover { background: rgba(59,130,246,0.05); }
  tbody td { padding: 9px 12px; vertical-align: middle; }

  .nf-badge {
    background: rgba(232,160,32,0.12);
    border: 1px solid rgba(232,160,32,0.25);
    border-radius: 6px;
    padding: 2px 8px;
    font-weight: 700;
    font-size: 0.78rem;
    color: var(--accent);
    white-space: nowrap;
  }
  .placa-badge {
    background: rgba(59,130,246,0.12);
    border: 1px solid rgba(59,130,246,0.25);
    border-radius: 6px;
    padding: 2px 8px;
    font-weight: 700;
    font-size: 0.75rem;
    color: var(--accent2);
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
  }
  .cidade-tag {
    display: inline-flex; align-items: center;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 2px 7px;
    font-size: 0.74rem;
    color: var(--text);
    white-space: nowrap;
  }
  .motorista-text { color: var(--text); font-weight: 500; }
  .cliente-name { font-weight: 600; color: var(--text); display: block; line-height: 1.3; }
  .cliente-cod { font-size: 0.72rem; color: var(--muted); }
  .vendedor-text { color: #a0a8c0; font-size: 0.78rem; }

  /* ── EMPTY ── */
  .empty {
    text-align: center;
    padding: 60px;
    color: var(--muted);
  }
  .empty .icon { font-size: 3rem; margin-bottom: 12px; opacity: .4; }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    header { padding: 12px 16px; }
    .filters { padding: 12px 16px; }
    .table-wrap { padding: 12px 8px; }
    .filter-group { min-width: 140px; }
  }
</style>
</head>

<header>
  <div class="logo">
    <div class="logo-icon">🚚</div>
    <div>
      <h1>Romaneio de Cargas — Varejo</h1>
      <p>Filial 01052 &nbsp;·&nbsp; 30 de junho de 2026</p>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat"><div class="stat-num" id="total-nfs">—</div><div class="stat-lbl">Notas</div></div>
    <div class="stat"><div class="stat-num" id="total-motoristas">—</div><div class="stat-lbl">Motoristas</div></div>
    <div class="stat"><div class="stat-num" id="total-cidades">—</div><div class="stat-lbl">Cidades</div></div>
    <div class="stat"><div class="stat-num" id="total-clientes">—</div><div class="stat-lbl">Clientes</div></div>
  </div>
</header>

<div class="filters">
  <div class="filter-group" style="flex:1; min-width:180px;">
    <label>🔍 Busca livre</label>
    <input type="text" id="f-busca" placeholder="NF, cliente, código, endereço…">
  </div>
  <div class="filter-group">
    <label>🧑‍✈️ Motorista</label>
    <select id="f-motorista"><option value="">Todos</option></select>
  </div>
  <div class="filter-group">
    <label>🚘 Placa</label>
    <select id="f-placa"><option value="">Todas</option></select>
  </div>
  <div class="filter-group">
    <label>🏙️ Cidade</label>
    <select id="f-cidade"><option value="">Todas</option></select>
  </div>
  <div class="filter-group">
    <label>🧑‍💼 Vendedor</label>
    <select id="f-vendedor"><option value="">Todos</option></select>
  </div>
  <button class="btn-clear" onclick="clearFilters()">✕ Limpar</button>
  <div class="count-badge">Exibindo <span id="count-vis">—</span> de <span id="count-tot">—</span></div>
</div>

<div class="table-wrap">
  <table id="main-table">

        <th onclick="sortBy('romaneio')" title="Ordenar por Romaneio">Romaneio <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('motorista')" title="Ordenar por Motorista">Motorista <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('placa')" title="Ordenar por Placa">Placa <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('cd_cliente')" title="Ordenar por Cód. Cliente">Cliente <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('cidade')" title="Ordenar por Cidade">Cidade <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('vendedor')" title="Ordenar por Vendedor">Vendedor <span class="sort-icon">↕</span></th>
        <th>Endereço</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty-msg" style="display:none">
    <div class="icon">📦</div>
    <p>Nenhum registro encontrado para os filtros selecionados.</p>
  </div>
</div>

// Deduplica por NF + cliente (mantém única)
const seen = new Set();
const DATA = RAW.filter(r => {
  const key = r.nr_nf + '|' + r.cd_cliente;
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
});

// Normaliza cidade (remove acentos para comparação)
function norm(s) { return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().trim(); }

let sortCol = 'nr_nf', sortDir = 1;
let filtered = [...DATA];

function buildSelects() {
  const motoristas = [...new Set(DATA.map(r => r.motorista).filter(Boolean))].sort();
  const placas     = [...new Set(DATA.map(r => r.placa).filter(Boolean))].sort();
  const cidades    = [...new Set(DATA.map(r => r.cidade).filter(Boolean).map(c => c.trim().toUpperCase()))].sort();
  const vendedores = [...new Set(DATA.map(r => r.vendedor).filter(Boolean))].sort();

  const fill = (id, arr) => {
    const sel = document.getElementById(id);
    arr.forEach(v => {
      const o = document.createElement('option');
      o.value = v; o.textContent = v;
      sel.appendChild(o);
    });
  };
  fill('f-motorista', motoristas);
  fill('f-placa', placas);
  fill('f-cidade', cidades);
  fill('f-vendedor', vendedores);
}

function updateStats() {
  const nfs  = new Set(DATA.map(r => r.nr_nf));
  const mots = new Set(DATA.map(r => r.motorista));
  const cids = new Set(DATA.map(r => norm(r.cidade)));
  const clis = new Set(DATA.map(r => r.cd_cliente));
  document.getElementById('total-nfs').textContent = nfs.size;
  document.getElementById('total-motoristas').textContent = mots.size;
  document.getElementById('total-cidades').textContent = cids.size;
  document.getElementById('total-clientes').textContent = clis.size;
  document.getElementById('count-tot').textContent = DATA.length;
}

function applyFilters() {
  const busca    = norm(document.getElementById('f-busca').value);
  const motorista= document.getElementById('f-motorista').value;
  const placa    = document.getElementById('f-placa').value;
  const cidade   = document.getElementById('f-cidade').value;
  const vendedor = document.getElementById('f-vendedor').value;

  filtered = DATA.filter(r => {
    if (motorista && r.motorista !== motorista) return false;
    if (placa && r.placa !== placa) return false;
    if (cidade && norm(r.cidade) !== norm(cidade)) return false;
    if (vendedor && r.vendedor !== vendedor) return false;
    if (busca) {
      const hay = norm([r.nr_nf, r.cd_cliente, r.ds_cliente, r.endereco, r.pedido, r.romaneio, r.cnpj].join(' '));
      if (!hay.includes(busca)) return false;
    }
    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    const va = (a[sortCol]||'').toString().toLowerCase();
    const vb = (b[sortCol]||'').toString().toLowerCase();
    return va < vb ? -sortDir : va > vb ? sortDir : 0;
  });

  render();
}

function render() {
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty-msg');
  document.getElementById('count-vis').textContent = filtered.length;

  if (!filtered.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(r => `
    <tr>
      <td><span class="nf-badge">${r.nr_nf}</span></td>
      <td style="color:var(--muted);font-size:.78rem">${r.romaneio}</td>
      <td class="motorista-text">${r.motorista || '—'}</td>
      <td><span class="placa-badge">${r.placa || '—'}</span></td>
      <td>
        <span class="cliente-name">${r.ds_cliente}</span>
        <span class="cliente-cod">${r.cd_cliente}</span>
      </td>
      <td><span class="cidade-tag">📍 ${(r.cidade||'').trim()}</span></td>
      <td class="vendedor-text">${r.vendedor || '—'}</td>
      <td style="color:var(--muted);font-size:.77rem;max-width:220px">${r.endereco || '—'}</td>
    </tr>
  `).join('');
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }

  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  const idx = ['nr_nf','romaneio','motorista','placa','cd_cliente','cidade','vendedor','endereco'].indexOf(col);
  if (idx >= 0) document.querySelectorAll('thead th')[idx].classList.add('sorted');

  applyFilters();
}

function clearFilters() {
  document.getElementById('f-busca').value = '';
  document.getElementById('f-motorista').value = '';
  document.getElementById('f-placa').value = '';
  document.getElementById('f-cidade').value = '';
  document.getElementById('f-vendedor').value = '';
  applyFilters();
}

['f-busca','f-motorista','f-placa','f-cidade','f-vendedor'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener(el.tagName === 'INPUT' ? 'input' : 'change', applyFilters);
});

buildSelects();
updateStats();
applyFilters();
</script>
